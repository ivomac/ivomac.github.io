<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="/style.css" type="text/css">
		<script id='script' src="/scripts/hide.js"></script>
	</head>
	<body>
		<h1 id="home"><a href="/index.html">Pull</a></h1>

		<ul>
			<a class="odd"  onclick="togglediv('dumbbell-curl')">DB Curl</a>
			<a class="even" onclick="togglediv('assisted-pullup')">Assisted pullup</a>
			<a class="odd"  onclick="togglediv('straight-arm-pulldown')">Straight arm pulldown</a>
			<a class="even" onclick="togglediv('suspended-inverted-row')">Suspended inverted row</a>
			<a class="odd"  onclick="togglediv('chinups')">Assisted Chinups</a>
			<a class="even" onclick="togglediv('seated-row')">Seated row</a>
		</ul>

		<div id="dumbbell-curl" style="display:none;">
			<video loop muted controls autoplay>
				<source src="https://athleanx.com/wp-content/uploads/2019/04/alternating_dumbbell_biceps_curl.mp4" type="video/mp4">
			</video>
		</div>

		<div id="assisted-pullup" style="display:none;">
			<video loop muted controls autoplay>
				<source src="https://athleanx.com/wp-content/uploads/2022/05/band-assisted-pullup.mp4" type="video/mp4">
			</video>
		</div>

		<div id="straight-arm-pulldown" style="display:none;">
			<video loop muted controls autoplay>
				<source src="https://athleanx.com/wp-content/uploads/2022/02/straight-arm-pushdown.mp4" type="video/mp4">
			</video>
		</div>

		<div id="suspended-inverted-row" style="display:none;">
			<video loop muted controls autoplay>
				<source src="/media/suspended_inverted_row.mp4" type="video/mp4">
			</video>
		</div>

		<div id="chinups" style="display:none;">
			<video loop muted controls autoplay>
				<source src="https://athleanx.com/wp-content/uploads/2022/02/bicep-chin-curls.mp4" type="video/mp4">
			</video>
		</div>

		<div id="seated-row" style="display:none;">
			<video loop muted controls autoplay>
				<source src="/media/seated_row.mp4" type="video/mp4">
			</video>
		</div>
		
	</body>
</html>
